# POUW Multi-Sector Chain - Mainnet production configuration
# Usage: copy this file to config.yaml

# Network configuration
network:
  # Mainnet mode
  type: mainnet
  
  # Mainnet ID
  chain_id: 9333
  
  # P2P configuration
  p2p:
    # Listen address (keep 0.0.0.0 in production)
    host: "0.0.0.0"
    port: 9333
    
    # Maximum peers
    max_peers: 100
    
    # Bootstrap nodes - replace with your real node addresses at deployment
    # At least 2 bootstrap nodes in different data centers/regions are recommended
    bootstrap_nodes:
      - "bootstrap1.pouwchain.io:9333"
      - "bootstrap2.pouwchain.io:9333"
      # Add more nodes to improve network stability
      # - "bootstrap3.pouwchain.io:9333"
  
  # RPC configuration
  rpc:
    enabled: true
    # In production, bind to internal network or use nginx reverse proxy
    host: "127.0.0.1"
    port: 8545
    # Allowed methods (must be explicitly listed in production)
    allowed_methods:
      - "chain_getInfo"
      - "chain_getHeight"
      - "blockchain_getBlock"
      - "blockchain_getLatestBlocks"
      - "tx_getStatus"
      - "account_getBalance"
      - "wallet_getBalance"
      - "wallet_getInfo"
      - "tx_send"
    # CORS configuration - restrict to your frontend domain
    cors_origins:
      - "https://your-frontend-domain.com"
      # Do not include localhost in production

# Node configuration
node:
  id: ""
  name: "POUW-MainNet-Node"
  sector: "auto"
  role: full  # Production recommendation: full or miner

# Mining configuration
mining:
  enabled: false  # Enable as needed
  miner_address: ""
  threads: 0
  
  pouw:
    accept_types:
      - "AI_INFERENCE"
      - "VIDEO_RENDER"
      - "SCIENTIFIC"
    max_concurrent: 8  # Can be increased in production
    timeout: 600  # Longer timeout for production

# Storage configuration
storage:
  data_dir: "./data"
  backend: leveldb  # leveldb is recommended in production
  block_cache_mb: 512  # Increase cache in production
  compression: true

# Wallet configuration
wallet:
  wallet_dir: "./wallets"
  auto_create: false  # Disable auto wallet creation in production
  mnemonic_words: 24  # Use 24 words in production

# Logging configuration
logging:
  level: INFO  # Production recommendation: INFO or WARNING
  file: "./logs/node.log"
  max_size_mb: 200
  max_files: 20
  console: false  # Disable console output in production

# Consensus parameters
consensus:
  # Consensus mode: sbox_primary, mixed, sbox_only, pouw_only
  mode: sbox_primary

  # In mixed mode, percentage of blocks to target SBOX_POUW (0.0 - 1.0)
  sbox_ratio: 0.65

  # In sbox_primary mode, percentage of blocks to inject classic POUW as support (0.0 - 1.0)
  pouw_support_ratio: 0.08

  # Globally enable/disable S-Box mining path
  sbox_enabled: true

  # PoW fallback policy: disabled, idle_block_only, emergency_pow
  fallback_policy: idle_block_only

  target_block_time: 30
  difficulty_adjustment_interval: 10
  initial_difficulty: 4
  base_reward: 50.0
  halving_interval: 210000
  max_block_size: 1048576

# API key (must be set via POUW_ADMIN_KEY in production, never leave empty)
# Example: export POUW_ADMIN_KEY=$(openssl rand -hex 32)
api:
  admin_key: ""  # Warning: auto-generated when empty, but changes on every restart. Must be fixed in production.
  websocket: true
  ws_port: 8546
  # Production security settings
  rate_limit: 100          # Max requests per IP per minute
  max_request_size: 1048576 # Max request body size: 1MB

# Development mode
dev:
  enabled: false
  debug_rpc: false
  simulated_latency: 0
