# POUW Multi-Sector Chain - Node configuration file

# Network configuration
network:
  # Network type: mainnet, testnet, devnet
  type: mainnet
  
  # Network ID (different networks should use different IDs)
  chain_id: 9333
  
  # P2P configuration
  p2p:
    # Listen address
    host: "0.0.0.0"
    port: 9333
    
    # Maximum peers
    max_peers: 50
    
    # Bootstrap nodes (used on first startup)
    # Mainnet deployment should configure at least 2 bootstrap nodes
    bootstrap_nodes:
      - "bootstrap1.pouwchain.io:9333"
      - "bootstrap2.pouwchain.io:9333"
  
  # RPC configuration
  rpc:
    enabled: true
    host: "127.0.0.1"
    port: 8545
    # Allowed methods (empty means all)
    allowed_methods: []
    # CORS configuration
    cors_origins: ["http://localhost:8545", "http://127.0.0.1:8545", "http://localhost:3000", "http://localhost:3001"]
    # Rate limit (max requests per IP per minute)
    rate_limit: 200

# Node configuration
node:
  # Node ID (auto-generated when empty)
  id: ""
  
  # Node name (display only)
  name: "POUW-Node-1"
  
  # Sector (auto-detected from hardware)
  sector: "auto"
  
  # Role: full (full node), light (wallet-only), miner, provider (compute provider)
  role: full

# Mining configuration
mining:
  # Enable mining (effective only when role=miner or role=provider)
  enabled: false
  
  # Miner address (uses default wallet when empty)
  miner_address: ""
  
  # Mining thread count (0 = auto)
  threads: 0
  
  # POUW task configuration
  pouw:
    # Accepted task types
    accept_types:
      - "AI_INFERENCE"
      - "VIDEO_RENDER"
      - "SCIENTIFIC"
    
    # Maximum concurrent tasks
    max_concurrent: 4
    
    # Task timeout (seconds)
    timeout: 300

# Storage configuration
storage:
  # Data directory
  data_dir: "./data"
  
  # Storage backend: sqlite, leveldb
  backend: leveldb
  
  # Block cache size
  block_cache_mb: 512
  
  # Enable compression
  compression: true

# Wallet configuration
wallet:
  # Wallet directory
  wallet_dir: "./wallets"
  
  # Auto-create default wallet (should be disabled in production)
  auto_create: false
  
  # Default mnemonic word count: 12, 15, 18, 21, 24
  mnemonic_words: 24

# Logging configuration
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: INFO
  
  # Log file
  file: "./logs/node.log"
  
  # Log rotation
  max_size_mb: 100
  max_files: 10
  
  # Output to console
  console: true

# Consensus parameters (usually no need to modify)
consensus:
  # Consensus mode: sbox_primary, mixed, sbox_only, pouw_only
  mode: sbox_primary

  # In mixed mode, percentage of blocks to target SBOX_POUW (0.0 - 1.0)
  sbox_ratio: 0.50

  # In sbox_primary mode, percentage of blocks to inject classic POUW as support (0.0 - 1.0)
  pouw_support_ratio: 0.10

  # Globally enable/disable S-Box mining path
  sbox_enabled: true

  # PoW fallback policy: disabled, idle_block_only, emergency_pow
  fallback_policy: idle_block_only

  # Target block time (seconds)
  target_block_time: 30
  
  # Difficulty adjustment interval (blocks)
  difficulty_adjustment_interval: 10
  
  # Initial difficulty
  initial_difficulty: 4
  
  # Block reward (compat field; actual rewards come from sector-specific ChainParams values)
  base_reward: 50.0
  
  # Treasury tax rate (part of block reward goes to treasury, remainder to miner)
  treasury_rate: 0.03
  
  # Halving interval (halves every 10000 blocks, about 3.5 days; reward decays to zero)
  halving_interval: 10000
  
  # Max block size (bytes)
  max_block_size: 1048576
  
  # Witness setting (testnet can be 1, mainnet must be 2)
  required_witnesses: 2

# API key (optional)
api:
  # Admin API key (auto-generated if empty, or override via POUW_ADMIN_KEY)
  admin_key: ""
  
  # Enable WebSocket
  websocket: true
  
  # WebSocket port
  ws_port: 8546

# Development mode
dev:
  # Development mode enabled
  enabled: false
  
  # Enable debug RPC
  debug_rpc: false
  
  # Simulated latency (ms)
  simulated_latency: 0
